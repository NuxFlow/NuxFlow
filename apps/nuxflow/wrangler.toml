name = "nuxflow"
main = ".output/server/index.mjs"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"

[vars]
# Set production values in the Cloudflare dashboard or via:
#   wrangler secret put SECRET_NAME
# BETTER_AUTH_SECRET =
# CLOUDFLARE_IMAGES_TOKEN =
# CLOUDFLARE_ACCOUNT_ID =
#
# Turso (optional — only needed if you choose Turso over the default D1 database):
# TURSO_URL =
# TURSO_AUTH_TOKEN =

[triggers]
# Scheduled publish — runs every minute
crons = ["* * * * *"]

# Dynamic plugin KV store — run to create:
#   wrangler kv namespace create PLUGIN_KV
# then paste the returned id below and in the preview_id field.
[[kv_namespaces]]
binding = "PLUGIN_KV"
id = "d6a28a91e4344aabbd952cb68cff4c3d"
preview_id = "b0bc527ba3ea4606aa5d49c1025bb07c"

# Dynamic Workers loader — spawns isolated Worker instances from code stored in KV.
# Requires compatibility_date >= 2026-03-02.
[[worker_loaders]]
binding = "LOADER"

# Cloudflare D1 database (default).
# Create with: wrangler d1 create nuxflow
# Then paste the returned database_id below and apply migrations:
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0000_lyrical_archangel.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0001_mean_shocker.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0001_fts5_search_index.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0002_familiar_johnny_storm.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0003_brainy_dorian_gray.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0004_premium_jocasta.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0005_dynamic_plugins.sql
#   wrangler d1 execute nuxflow --remote --file=../../packages/db/migrations/0006_theme_css.sql
# To use Turso instead: remove this block and set TURSO_URL + TURSO_AUTH_TOKEN secrets.
[[d1_databases]]
binding = "DB"
database_name = "nuxflow"
database_id = "ac5245c7-c022-4bfb-a18a-eb2ba78b02cb"
